<button
  class="toggle"
  [class.is-dark]="isDark()"
  (click)="toggle()"
  type="button"
  aria-label="Toggle theme"
>
  <span class="toggle-track">
    <!-- Sun icon -->
    <sh3-icon name="theme-light" [size]="14" class="icon icon-sun" />

    <!-- Moon icon -->
    <sh3-icon name="theme-dark" [size]="14" class="icon icon-moon" />

    <span class="toggle-thumb"></span>
  </span>
</button>
