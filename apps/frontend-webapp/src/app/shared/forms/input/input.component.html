<!-- File: apps/frontend-webapp/src/app/shared/forms/input/input.component.html -->
<label [attr.for]="inputId" class="mb-2 text-sm font-medium text-fadedText">{{ label() }}</label>

@if (control) {
  <div class="input-wrapper relative w-full h-full flex">
    <input
      [id]="inputId"
      [attr.type]="type()"
      [attr.min]="min() !== null ? min() : null"
      [attr.max]="max() !== null ? max() : null"
      [attr.disabled]="disabled || null"
      [formControl]="control"
      class="w-full px-3 py-2 border rounded-md bg-surface-2 text-base text-fadedText focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent disabled:opacity-40 disabled:cursor-not-allowed" />
    @if (type() === 'number') {
      <div class="number-controls absolute right-4 top-1 flex flex-col space-y-1">
        <button type="button" class="text-lg leading-none p-0 text-gray-700 bg-transparent cursor-pointer disabled:opacity-40 disabled:cursor-not-allowed" (click)="increment()" [disabled]="disabled">+</button>
        <button type="button" class="text-lg leading-none p-0 text-gray-700 bg-transparent cursor-pointer disabled:opacity-40 disabled:cursor-not-allowed" (click)="decrement()" [disabled]="disabled">−</button>
      </div>
    }
  </div>
}

@else {
  <div class="input-wrapper relative w-full h-full flex">
    <input
      [id]="inputId"
      [attr.type]="type()"
      [attr.min]="min()"
      [attr.max]="max()"
      [value]="value"
      tabindex="0"
      [attr.disabled]="disabled || null"
      (input)="onInputChange($event)"
      (blur)="onTouched()"
      class="w-full px-3 py-2 border rounded-md bg-surface-4  text-fadedText focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent disabled:opacity-40 disabled:cursor-not-allowed" />
    @if (type() === 'number') {
      <div class="number-controls absolute right-4 top-1 flex flex-col space-y-1">
        <button type="button" class="text-lg leading-none p-0 text-gray-700 bg-transparent cursor-pointer disabled:opacity-40 disabled:cursor-not-allowed" (click)="increment()" [disabled]="disabled">+</button>
        <button type="button" class="text-lg leading-none p-0 text-gray-700 bg-transparent cursor-pointer disabled:opacity-40 disabled:cursor-not-allowed" (click)="decrement()" [disabled]="disabled">−</button>
      </div>
    }
  </div>
}
