<div class="tab-header">
  <!-- 🔥 tab control and navigation -->
  @if (allowDynamicTabs) {
    <div class="add-tab"
      (click)="addNewTab()"
      cdkDrag [cdkDragDisabled]="true">
      ＋
    </div>
  }

  <div
    #tabHeaderRef
    class="tab-header-scroll-container"
    tabindex="-1"
    cdkDropList
    [cdkDropListData]="tabs"
    (cdkDropListDropped)="dropTab($event)"
    [cdkDropListOrientation]="'horizontal'"
    [cdkDropListLockAxis]="'x'"
    >

    @for (tab of tabs ; track trackByTabId(i, tab); let i = $index) {
      <div
        class="tab"
        [class.active]="tab.isActive"
        [class.tab-editing]="tab.isEditingTitle"
        [class.with-search]="tab.isActive && tab.isSearchVisible"
        cdkDrag
        [cdkDragLockAxis]="'x'"
        [cdkDragBoundary]="'.tab-header-scroll-container'"
        (click)="activateTab(tab.id)"
        (dblclick)="tab.isTitleEditable !== false && enableTabNameEdit(tab)"
        >
        <!-- Nom normal ou édition -->
        @if (!tab.isEditingTitle) {
          {{ tab.title }}
        } @else {
          <input
            [(ngModel)]="tab.title"
            (keydown.enter)="disableTabNameEdit(tab)"
            (blur)="disableTabNameEdit(tab)"
            autofocus
            />
        }
        <!-- 🔥 buttons -->
        @if (tab.isSearchable) {
          <span class="search-toggle" (click)="toggleSearch(tab)"><mat-icon>search</mat-icon></span>
        }
        @if (tab.isDeletable) {
          <span class="close" (click)="closeTab(tab.id)">✕</span>
        }
      </div>
    }
  </div>
</div>

@if (activeTab; as tab) {
  @if (tab.isSearchVisible) {
    <div class="modern-search-bar">
      <div class="input-wrapper">
        <input
          [(ngModel)]="tab.searchValue"
          (ngModelChange)="applyFilter($event)"
          placeholder="Search..."
          />
        <div class="underline"></div>
      </div>
    </div>
  }
}

<div class="tab-content">
  <!-- 🔥 active tab content -->
  <ng-template #tabContentHost></ng-template>
</div>
