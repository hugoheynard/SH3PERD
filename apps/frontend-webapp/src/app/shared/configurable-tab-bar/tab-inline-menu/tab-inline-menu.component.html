<span class="tab-inline-actions" (pointerup)="$event.stopPropagation()">
  <sh3-button-icon icon="palette" size="xs" tooltip="Color"
    (clicked)="onColor($event)" />

  @if (canMoveToConfig() && savedConfigs().length) {
    <span class="tab-move-wrapper" #moveBtn>
      <sh3-button-icon icon="arrow-right" size="xs" tooltip="Move to config"
        (clicked)="onToggleMoveMenu($event, moveBtn)" />

      @if (moveMenuOpen()) {
        <div class="tab-move-dropdown"
          [style.top.px]="moveDropdownPos().top" [style.left.px]="moveDropdownPos().left">
          <span class="tab-move-label">Move to</span>
          @for (cfg of savedConfigs(); track cfg.id) {
            <sh3-button variant="ghost" size="sm"
              (clicked)="onMoveTo(cfg.id, $event)">{{ cfg.name }}</sh3-button>
          }
        </div>
      }
    </span>
  }

  @if (canClose()) {
    <sh3-button-icon icon="close" tone="critical" size="xs" tooltip="Close"
      (clicked)="onClose($event)" />
  }
</span>
