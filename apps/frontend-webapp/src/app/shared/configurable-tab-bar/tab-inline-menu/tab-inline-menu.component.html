<span class="tab-inline-actions" (pointerup)="$event.stopPropagation()">
  <sh3-button-icon
    icon="palette"
    size="xs"
    [tooltip]="colorLabel()"
    (clicked)="onColor($event)"
  />

  @if (canMoveToConfig() && savedConfigs().length) {
    <span class="tab-move-wrapper" #moveBtn>
      <sh3-button-icon
        icon="arrow-right"
        size="xs"
        [tooltip]="moveToConfigLabel()"
        (clicked)="onToggleMoveMenu($event, moveBtn)"
      />

      @if (moveMenuOpen()) {
        <div
          class="tab-move-dropdown"
          [style.top.px]="moveDropdownPos().top"
          [style.left.px]="moveDropdownPos().left"
        >
          <span class="tab-move-label">{{ moveToLabel() }}</span>
          @for (cfg of savedConfigs(); track cfg.id) {
            <sh3-button
              variant="ghost"
              size="sm"
              [class.tab-move-option--locked]="cfg.locked"
              (clicked)="onMoveTo(cfg, $event)"
            >
              @if (cfg.locked) {
                <sh3-icon name="lock" size="xs" />
              }
              <span>{{ cfg.name }}</span>
            </sh3-button>
          }
        </div>
      }
    </span>
  }

  @if (canClose()) {
    <sh3-button-icon
      icon="close"
      tone="critical"
      size="xs"
      [tooltip]="closeLabel()"
      (clicked)="onClose($event)"
    />
  }
</span>
