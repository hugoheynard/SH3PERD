<!-- ═══════════════════════════════════════════════════
     CONFIGURABLE TAB BAR (orchestrator)
     Structure: [tab-strip] [+/lock] [tabBarTrailing slot] [config-panel]
     ═══════════════════════════════════════════════════ -->

<!-- Hidden color picker (positioned off-screen via CSS) -->
<input type="color" class="hidden-color-input" #colorInput (input)="onColorSelected($event)" />

<div class="tab-bar">

  <!-- Tab strip -->
  <sh3-tab-strip
    [tabs]="tabs()"
    [activeTabId]="activeTabId()"
    [savedConfigs]="savedConfigs()"
    (tabSelect)="dispatch('tabSelect', $event)"
    (tabClose)="dispatch('tabClose', $event)"
    (tabRename)="dispatch('tabRename', $event)"
    (tabReorder)="dispatch('tabReorder', $event)"
    (tabColorRequested)="onTabColorRequested($event)"
    (tabMoveToConfig)="dispatch('tabMoveToConfig', $event)"
  />

  <!-- Add-tab affordance: plus by default, lock when the host flags `locked` -->
  @if (locked()) {
    <sh3-button-icon icon="lock" size="sm" tooltip="Tab limit reached"
      (clicked)="lockClicked.emit()" />
  } @else {
    <sh3-button-icon icon="plus" size="sm" tooltip="Add tab"
      (clicked)="onTabAdd()" />
  }

  <!-- Domain-specific slot (e.g. search input) -->
  <ng-content select="[tabBarTrailing]" />

  <!-- Config panel (save / load) -->
  @if (canSaveRecall()) {
    <sh3-tab-config-panel
      [activeConfigId]="activeConfigId()"
      [savedConfigs]="savedConfigs()"
      [showToasts]="showToasts()"
      (configSave)="dispatch('configSave', $event)"
      (configNew)="dispatch('configNew', undefined)"
      (configLoad)="dispatch('configLoad', $event)"
      (configDelete)="dispatch('configDelete', $event)"
      (configRename)="dispatch('configRename', $event)"
      (configTabRemove)="dispatch('configTabRemove', $event)"
      (configTabRename)="dispatch('configTabRename', $event)"
      (configTabMove)="dispatch('configTabMove', $event)"
    />
  }
</div>
