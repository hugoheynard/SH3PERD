@if (preview()) {

  <div
    class="drag-preview"
    [style.transform]="'translate3d(' + drag.cursorX() + 'px,' + drag.cursorY() + 'px,0) translate(-50%, -50%)'">
    <ng-container
      *ngComponentOutlet="
        preview()!.component;
        inputs: preview()!.inputs
      ">
    </ng-container>

  </div>

}
