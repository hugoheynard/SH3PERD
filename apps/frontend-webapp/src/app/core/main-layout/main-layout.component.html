<app-header />

<div class="app-layout">
  <appMenu class="menu-left" />

  <div class="layout-body">
    <div class="layout-main">
      <div class="panel" [ngClass]="{ 'hidden': !hasLeftPanel() }">
        <ng-template #leftPanelContainer />
      </div>

      <app-circular-menu #circularMenu
        [menuItems]="[
        { label: 'Home', iconName: 'home', route: '/home' },
        { label: 'Calendar', iconName: 'calendar_today', route: '/profile' },
        { label: 'Music', iconName: 'library_music', route: '/musicLibrary' },
        { label: 'Playlists', iconName: 'queue_music', route: '/settings' },
        { label: 'Settings', iconName: 'settings', route: '/settings' },
        { label: 'Contracts', iconName: 'contracts', route: '/contracts' },
        { label: 'Logout', iconName: 'logout', route: '/settings' },

        ]"
      />

      <div class="content">
        <router-outlet />
      </div>

      <div class="panel" [ngClass]="{ 'hidden': !hasRightPanel() }">
        <ng-template #rightPanelContainer />
      </div>

      <div class="context-menu" [ngClass]="{ 'hidden': !hasContextMenu() }">
        <ng-template #contextMenuContainer />
      </div>
    </div>

  </div>
</div>
