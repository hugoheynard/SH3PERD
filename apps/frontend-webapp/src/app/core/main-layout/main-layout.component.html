<app-header class="[grid-area:header]"/>
<app-circular-menu />

<appMenu class="[grid-area:menuLeft]" />

<div class="[grid-area:content]">
  <div class="content">

    <div class="panel panel-left" [ngClass]="{ 'hidden': !hasLeftPanel(), 'panel--over': leftPanelMode() === 'over', 'panel--push': leftPanelMode() === 'push' }">
      <ng-template #leftPanelContainer />
    </div>

    <div class="main-content">
      <router-outlet />
    </div>

    <div class="panel panel-right" [ngClass]="{ 'hidden': !hasRightPanel(), 'panel--over': rightPanelMode() === 'over', 'panel--push': rightPanelMode() === 'push' }">
      <ng-template #rightPanelContainer />
    </div>

    <div class="context-menu w-appMenu shadow-md bg-menu sm:none" [ngClass]="{ 'hidden': hasContextMenu() }">
      <ng-template #contextMenuContainer />
    </div>

    <div class="popover-layer" [ngClass]="{ 'hidden': !hasPopover() }">
      <ng-template #popoverContainer />
    </div>
  </div>

  <sh3-toast-container />

</div>

<!--
  Global audio player bar. Mounted at the very end of the layout so it
  can use fixed positioning against the viewport without being
  constrained by the grid. Hides itself via its own host class when
  there's no track loaded.
-->
<app-audio-player-bar />
