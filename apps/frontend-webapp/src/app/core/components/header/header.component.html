<div class="left">
  <button class="mobile-menu-btn" (click)="onMenuClick()" aria-label="Open menu">
    <mat-icon>menu</mat-icon>
  </button>
  <!-- Logo ou nom d'application -->
  <div>
    <span class="app-name">SH3PHERD</span>
    <span class="page-name">{{ getCurrentPageName() }}</span>
  </div>

</div>

<div class="right">
  <div class="theme-switch" (click)="toggleTheme()">
    <div class="switch-track">
      <div class="switch-thumb" [class.dark]="isDark">
        {{ isDark ? '🌙' : '🌞' }}
      </div>
    </div>
  </div>

  <button
    class="notification-bell"
    (click)="openNotifications()">

    🔔

    @if (unreadNotificationsCount() > 0) {
      <span class="badge">
      {{ unreadNotificationsCount() }}
    </span>
    }

  </button>

  <!-- Profile pastille + dropdown -->
  <div class="profile-area">
    <button class="profile-circle" (click)="toggleProfileMenu()" type="button" aria-label="User menu">
      {{ userInitial() }}
    </button>

    @if (showProfileMenu()) {
      <div class="profile-dropdown">
        @if (userDisplayName()) {
          <div class="profile-dropdown__header">
            <span class="profile-dropdown__name">{{ userDisplayName() }}</span>
          </div>
        }
        <button class="profile-dropdown__item" type="button" (click)="goToProfile()">
          <span class="profile-dropdown__icon">👤</span>
          Profile
        </button>
        <div class="profile-dropdown__divider"></div>
        <button class="profile-dropdown__item profile-dropdown__item--danger" type="button" (click)="logout()">
          <span class="profile-dropdown__icon">🚪</span>
          Log out
        </button>
      </div>
    }
  </div>
</div>
