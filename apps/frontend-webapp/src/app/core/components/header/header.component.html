<div class="left">
  <button class="mobile-menu-btn" (click)="onMenuClick()" aria-label="Open menu">
    <mat-icon>menu</mat-icon>
  </button>
  <!-- Logo ou nom d'application -->
  <div>
    <span class="app-name">SH3PHERD</span>
    <span class="page-name">{{ getCurrentPageName() }}</span>
  </div>

</div>

<div class="right">
  @if (planLabel()) {
    <div class="plan-badge-area">
      <button class="plan-badge" type="button" (click)="goToUpgrade()"
            [class.plan-badge--free]="userPlan() === 'artist_free' || userPlan() === 'company_free'"
            [class.plan-badge--pro]="userPlan() === 'artist_pro' || userPlan() === 'company_pro'"
            [class.plan-badge--max]="userPlan() === 'artist_max' || userPlan() === 'company_business'">
        {{ planLabel() }}
      </button>
      @if (showUpgrade()) {
        <button class="upgrade-btn" type="button" (click)="goToUpgrade()">Upgrade</button>
      }
    </div>
  }

  <sh3-theme-toggle />

  <button class="help-btn" type="button" (click)="openHelp()" aria-label="Help">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
      <line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
  </button>

  <button class="notification-bell" type="button" (click)="openNotifications()" aria-label="Notifications">
    <svg class="bell-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
    <div class="notif-badges">
      @if (unreadByType().error > 0) {
        <span class="notif-badge notif-badge--alert">{{ unreadByType().error }}</span>
      }
      @if (unreadByType().warning > 0) {
        <span class="notif-badge notif-badge--warning">{{ unreadByType().warning }}</span>
      }
      @if (unreadByType().info > 0) {
        <span class="notif-badge notif-badge--info">{{ unreadByType().info }}</span>
      }
    </div>
  </button>

  <!-- Profile pastille + dropdown -->
  <div class="profile-area">
    <button class="profile-circle" (click)="toggleProfileMenu()" type="button" aria-label="User menu">
      {{ userInitial() }}
    </button>

    @if (showProfileMenu()) {
      <div class="profile-dropdown">
        @if (userDisplayName()) {
          <div class="profile-dropdown__header">
            <span class="profile-dropdown__name">{{ userDisplayName() }}</span>
          </div>
        }
        <button class="profile-dropdown__item" type="button" (click)="goToProfile()">
          <span class="profile-dropdown__icon">👤</span>
          Profile
        </button>
        <div class="profile-dropdown__divider"></div>
        <button class="profile-dropdown__item profile-dropdown__item--danger" type="button" (click)="logout()">
          <span class="profile-dropdown__icon">🚪</span>
          Log out
        </button>
      </div>
    }
  </div>
</div>
