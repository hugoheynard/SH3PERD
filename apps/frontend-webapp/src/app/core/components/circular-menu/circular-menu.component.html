@if (isOpen()) {
  <div class="overlay" (click)="close()"></div>
}

@if (isOpen()) {
  <div class="grid-menu">
    <button class="menu-item" (click)="toggle()"><mat-icon class="menu-icon">clear</mat-icon></button>
    @for (item of menuItems; track item; let i = $index) {
      <button
        class="menu-item"
        [ngStyle]="{ '--i': i }"
        >
        <mat-icon class="menu-icon">{{ item.iconName }}</mat-icon>
      </button>
    }
  </div>
}
