<label class="file-label">
  <span *ngIf="label" class="label-text">{{ label }}</span>
  <input
    type="file"
    class="native-file-input"
    [attr.accept]="accept"
    [disabled]="disabled"
    (change)="onFileSelected($event)"
  />
  <div class="custom-file-input">
    <span>{{ fileName || placeholder }}</span>
  </div>
</label>
