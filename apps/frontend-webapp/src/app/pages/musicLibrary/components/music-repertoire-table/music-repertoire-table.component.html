<!-- 404 Error -->
<div *ngIf="hasError404" class="error-page">
  <h1>404</h1>
  <p>Oups ! Something went wrong</p>
</div>

<!-- No Match Result -->
<div *ngIf="hasNoMatch && !hasError404" class="error-page">
  <h1>NO MATCH</h1>
  <span>Try different search parameters.</span>
  <sh3-button-primary buttonLabel="Back to search" [onClick]="handleBackToConfig"/>
</div>


<table
  *ngIf="!hasError404 && !hasNoMatch"
  cdk-table [dataSource]="pagedData" class="transparent-table">

  <ng-container *ngFor="let column of displayedColumns" [cdkColumnDef]="column.key">
    <th cdk-header-cell *cdkHeaderCellDef> {{ column.key }} </th>

    <td cdk-cell *cdkCellDef="let row">
      <ng-container *ngIf="column.key === 'duration'; else defaultCell">
        {{ row[column.key] | duration }}
      </ng-container>
      <ng-template #defaultCell>
        {{ row[column.key] }}
      </ng-template>
    </td>
  </ng-container>

  <tr cdk-header-row *cdkHeaderRowDef="columnKeys"></tr>
  <tr
    cdk-row
    *cdkRowDef="let row; columns: columnKeys; let i = index"
    [ngStyle]="{ animationDelay: i * 100 + 'ms' }"
    class="table-row-animate"
    (dblclick)="openDetails(row)"
  ></tr>
</table>

<div class="custom-paginator"  *ngIf="!hasError404 && !hasNoMatch">
  <button (click)="setPage(currentPage - 1)" [disabled]="currentPage === 0">◀</button>
  <span>{{ currentPage + 1 }} / {{ totalPages }}</span>
  <button (click)="setPage(currentPage + 1)" [disabled]="currentPage + 1 >= totalPages">▶</button>
</div>
