
<app-select-checkbox
  [formControl]="services"
  [label]="'Services'"
  [options]="[{ label: 'artistic', value: 'artistic'}]"/>

@if (formGroup?.get('categories')?.enabled) {
  <app-select-checkbox
    [formControl]="categories"
    [label]="'Categories'"
    [options]="[
    { label: 'dj', value: 'dj'},
    { label: 'musicians', value: 'dj'}
    ]"/>
}
