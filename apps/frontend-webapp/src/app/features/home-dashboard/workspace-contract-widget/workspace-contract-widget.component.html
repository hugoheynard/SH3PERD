<div class="widget">
  <div class="workspace-title">{{ contractName }}</div>
  @if (clientName) {
    <div class="workspace-client">{{ clientName }}</div>
  }
  <div class="workspace-dates">{{ startDate }} → {{ endDate }}</div>
  <div class="workspace-status" [ngClass]="status.toLowerCase()">
    {{ status }}
  </div>
</div>
