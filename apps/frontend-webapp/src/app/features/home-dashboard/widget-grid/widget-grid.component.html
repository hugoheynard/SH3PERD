<gridster [options]="options" class="widget-grid">
  @for (item of dashboard(); track item.instanceId) {
    <gridster-item [item]="item" class="widget-wrapper">
      <ng-container
        *ngComponentOutlet="
          item.component;
          inputs: item.inputs;
          injector: item.injector
        "
      ></ng-container>
    </gridster-item>
  }
</gridster>
