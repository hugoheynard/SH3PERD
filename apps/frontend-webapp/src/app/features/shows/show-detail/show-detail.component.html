@let show = detail();
@if (loading() && !show) {
  <sh3-loading message="Loading show…" />
} @else if (show) {
  <div class="show-detail">
    <app-show-detail-header />

    <!-- ── Sections ───────────────────────────────────── -->

    <div
      #sectionsEl
      class="sections"
      [class.is-reordering]="isReorderingSection()"
      uiDndDropZone
      [dropZone_id]="'sections:' + show.id"
      [dropZoneAccept]="['show-section']"
      (uiDndDrop)="onSectionsReorderDrop($event)"
    >
      @for (section of show.sections; track trackSection($index, section)) {
        <app-show-section
          [showId]="show.id"
          [section]="section"
          [multiSection]="show.sections.length > 1"
        >
          <app-show-section-header
            sectionHeader
            [showId]="show.id"
            [section]="section"
            [multiSection]="show.sections.length > 1"
          />
          <app-target-bar
            sectionTarget
            label="Target"
            [targetSeconds]="targetSeconds(section)"
            [actualSeconds]="section.totalDurationSeconds"
            ariaLabel="Target duration in minutes"
            (commitMinutes)="updateSectionTargetMinutes(section, $event)"
          />
          <app-show-section-footer sectionFooter [section]="section" />
        </app-show-section>
      }
      <!-- Cursor-driven insertion bar — only shown during a section drag,
           positioned at the slot under the cursor (playlist-tracks UX). -->
      @if (isReorderingSection() && insertIndex() >= 0) {
        <div
          class="insertion-bar"
          [style.top.px]="insertY()"
          aria-hidden="true"
        >
          <span class="insertion-dot insertion-dot--start"></span>
          <span class="insertion-line"></span>
          <span class="insertion-dot insertion-dot--end"></span>
        </div>
      }
    </div>

    <sh3-button variant="ghost" (clicked)="onAddSection()">
      <sh3-icon name="plus" [size]="14" />
      <span>Add section</span>
    </sh3-button>
  </div>
} @else {
  <div class="show-not-found">
    <sh3-icon name="microphone" [size]="32" />
    <p>Show not found.</p>
  </div>
}
