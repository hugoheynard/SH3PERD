<div class="panel">
  <header class="panel-head">
    <div class="panel-title">
      <sh3-icon name="microphone" [size]="14" />
      <span>Show</span>
    </div>
    <div class="head-actions">
      <button
        class="head-btn"
        type="button"
        title="Browse music library"
        aria-label="Browse music library"
        (click)="openMusicLibrary()"
      >
        <sh3-icon name="music" [size]="14" />
      </button>
      <button
        class="head-btn"
        type="button"
        title="Browse playlists"
        aria-label="Browse playlists"
        (click)="openPlaylists()"
      >
        <sh3-icon name="play" [size]="14" />
      </button>
      <button
        class="head-btn"
        type="button"
        title="Open full page"
        aria-label="Open full page"
        (click)="openFullPage()"
      >
        <sh3-icon name="arrow-right" [size]="14" />
      </button>
      <button
        class="head-btn"
        type="button"
        aria-label="Close panel"
        (click)="close()"
      >
        <sh3-icon name="close" [size]="14" />
      </button>
    </div>
  </header>

  <div class="panel-body">
    <app-show-detail [showId]="showId()" />
  </div>
</div>
