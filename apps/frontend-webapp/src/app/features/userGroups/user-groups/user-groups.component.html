@if (!userGroupObject) {

} @else {
  <data-list
    [data]="userGroupObject.userGroups"
    [column]="[
    { fromKey: 'name', label: 'Name' },
    { fromKey: 'description', label: 'Description' },
    { fromKey: 'groupLead', label: 'Group Lead' },
    { fromKey: 'members', label: 'Members' }
  ]"

    [rowActionsTemplate]="actionsTemplate"
  />
}



<!-- row action template -->
<ng-template #actionsTemplate let-userGroup>
  <sh3-button-icon icon='edit' (clicked)="edit(userGroup)"/>
  <sh3-button-icon icon='bin' (clicked)="delete(userGroup)"/>
</ng-template>
