@if (playlistId() === null) {
  <div class="state state--empty">
    <sh3-icon name="playlist-add" [size]="40" />
    <span class="state-title">No playlist selected</span>
    <span class="state-hint">
      Pick a playlist from the list to see its tracks here.
    </span>
  </div>
} @else if (loading() && detail() === null) {
  <div class="state state--loading">
    <sh3-icon name="music-note" [size]="32" />
    <span class="state-title">Loading…</span>
  </div>
} @else if (detail(); as pl) {
  @let sum = summary();

  <app-playlist-header [playlist]="pl" [summary]="sum" />

  <app-playlist-track-list
    [playlistId]="pl.id"
    [tracks]="pl.tracks"
    (dropped)="onTracklistDrop($event)"
    (emptyDropped)="onEmptyTracklistDrop($event)"
    (removeTrack)="onRemoveTrack($event)"
  />
}
