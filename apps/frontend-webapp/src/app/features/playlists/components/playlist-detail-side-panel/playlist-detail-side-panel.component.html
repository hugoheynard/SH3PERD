<div class="panel">
  <header class="panel-head">
    <div class="panel-title">
      <sh3-icon name="playlist-add" [size]="14" />
      <span>Playlist</span>
    </div>
    <button
      class="close-btn"
      type="button"
      aria-label="Close panel"
      (click)="close()"
    >
      <sh3-icon name="close" [size]="14" />
    </button>
  </header>

  <div class="panel-body">
    <app-playlist-detail [playlistId]="playlistId()" />
  </div>
</div>
