@let pl = playlist();

<article
  class="card"
  [attr.data-color]="pl.color"
  role="button"
  tabindex="0"
  (click)="onClick()"
  (keydown)="onKey($event)"
  uiDndDrag
  [dndType]="'playlist'"
  [dndData]="dragPayload()"
>
  <span class="color-stripe" [attr.data-color]="pl.color"></span>

  <div class="body">
    <header class="head">
      <div class="title-block">
        <h3 class="name">{{ pl.name }}</h3>
        @if (pl.description) {
          <p class="desc">{{ pl.description }}</p>
        } @else {
          <p class="desc desc--empty">No description</p>
        }
      </div>

      <button
        class="more-btn"
        type="button"
        aria-label="More actions"
        (click)="onMoreClick($event)"
      >
        <sh3-icon name="more-vertical" [size]="14" />
      </button>
    </header>

    <!-- ── Primary meta: tracks + duration ── -->

    <div class="primary-meta">
      <span class="meta-chip">
        <sh3-icon name="music-note" [size]="11" />
        <span class="meta-value">{{ pl.trackCount }}</span>
        <span class="meta-label"
          >track{{ pl.trackCount !== 1 ? "s" : "" }}</span
        >
      </span>
      <span class="meta-chip">
        <sh3-icon name="clock" [size]="11" />
        <span class="meta-value">{{ duration() }}</span>
      </span>
    </div>

    <!-- ── Rating aggregates: mean + per-track sparkline ── -->

    <app-rating-row class="ratings" variant="card" [groups]="ratingGroups()" />
  </div>
</article>
