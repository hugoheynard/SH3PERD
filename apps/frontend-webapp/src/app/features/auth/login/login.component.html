<div class="login-page">

  <!-- ── Left: brand panel ── -->
  <ui-brand-panel />

  <!-- ── Right: auth panel ── -->
  <main class="auth-panel">
    <div class="auth-inner">

      <div class="auth-logo">
        <img
          src="assets/logo/shepherd-dog-icon.png"
          alt=""
          class="auth-logo-icon"
          width="28"
          height="28"
          aria-hidden="true"
        />
        <span class="auth-logo-name">SHEPHERD</span>
      </div>

      <nav class="auth-tabs">
        <a class="auth-tab auth-tab--active" routerLink="/login">Sign in</a>
        <a class="auth-tab" routerLink="/register">Sign up</a>
      </nav>

      <div class="auth-header">
        <h2 class="auth-title">Welcome back</h2>
        <p class="auth-subtitle">Sign in to your workspace to continue.</p>
      </div>

      <app-login-form (login)="onLogin($event)" />

    </div>
  </main>

</div>
