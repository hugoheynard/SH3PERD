<div class="login-page">

  <!-- Left: brand panel -->
  <ui-brand-panel />

  <!-- Right: auth panel -->
  <main class="auth-panel">
    <div class="auth-inner">

      <div class="auth-logo">
        <img
          src="assets/logo/shepherd-dog-icon.png"
          alt=""
          class="auth-logo-icon"
          width="28"
          height="28"
          aria-hidden="true"
        />
        <span class="auth-logo-name">SHEPHERD</span>
      </div>

      @if (!submitted()) {

        <div class="auth-header">
          <h2 class="auth-title">Forgot your password?</h2>
          <p class="auth-subtitle">Enter your email and we'll send you a reset link.</p>
        </div>

        <form class="forgot-form" (ngSubmit)="onSubmit()" novalidate>

          <div class="fields">
            <div class="field-group">
              <sh3-input
                label="Email"
                type="email"
                name="email"
                size="lg"
                placeholder="you@company.com"
                [ngModel]="email()"
                (ngModelChange)="email.set($event)"
                required />
            </div>
          </div>

          <sh3-button
            variant="solid"
            size="lg"
            type="submit"
            [disabled]="!email().trim() || loading()"
            (clicked)="onSubmit()">Send reset link</sh3-button>

        </form>

      } @else {

        <div class="success-message">
          <div class="success-icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <circle cx="24" cy="24" r="24" fill="rgba(6,164,164,.12)"/>
              <path d="M16 24l6 6 10-12" stroke="#06a4a4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
          </div>
          <h2 class="auth-title">Check your email</h2>
          <p class="auth-subtitle">
            We've sent a password reset link to <strong>{{ email() }}</strong>. It expires in 1 hour.
          </p>
        </div>

      }

      <p class="auth-footer">
        <a routerLink="/login" class="auth-link">Back to sign in</a>
      </p>

    </div>
  </main>

</div>
