<form #credentials="ngForm" (ngSubmit)="onSubmit(credentials)" novalidate>
  <div class="fields">
    <div class="field-group">
      <sh3-input
        id="email"
        label="Email"
        type="email"
        name="email"
        size="lg"
        placeholder="you@company.com"
        autocomplete="email"
        ngModel
        required
      />
    </div>

    <div class="field-group">
      <sh3-input
        id="password"
        label="Password"
        type="password"
        name="password"
        size="lg"
        placeholder="••••••••••••"
        autocomplete="current-password"
        ngModel
        required
      />
      <div class="field-hint">
        <a routerLink="/forgot-password" class="forgot-link" tabindex="-1"
          >Forgot password?</a
        >
      </div>
    </div>
  </div>

  <sh3-turnstile
    [siteKey]="turnstileSiteKey"
    theme="dark"
    (verified)="onCaptchaVerified($event)"
    (expired)="onCaptchaExpired()"
    (errored)="onCaptchaError()"
  />

  <sh3-button
    [disabled]="!credentials.valid || !captchaToken()"
    type="submit"
    (clicked)="onSubmit(credentials)"
    >Sign in</sh3-button
  >
</form>
