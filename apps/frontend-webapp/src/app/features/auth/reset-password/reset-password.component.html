<div class="login-page">

  <!-- Left: brand panel -->
  <ui-brand-panel />

  <!-- Right: auth panel -->
  <main class="auth-panel">
    <div class="auth-inner">

      <div class="auth-logo">
        <img
          src="assets/logo/shepherd-dog-icon.png"
          alt=""
          class="auth-logo-icon"
          width="28"
          height="28"
          aria-hidden="true"
        />
        <span class="auth-logo-name">SHEPHERD</span>
      </div>

      @if (token()) {

        <div class="auth-header">
          <h2 class="auth-title">Set your new password</h2>
        </div>

        <form class="reset-form" (ngSubmit)="onReset()" novalidate>

          <div class="fields">

            <sh3-password-field
              label="New password"
              placeholder="Enter new password"
              name="newPassword"
              (valueChange)="newPassword.set($event)"
              (validChange)="passwordValid.set($event)" />

            <div class="field-group">
              <sh3-input
                label="Confirm password"
                type="password"
                name="confirmPassword"
                size="lg"
                placeholder="Confirm new password"
                [ngModel]="confirmPassword()"
                (ngModelChange)="confirmPassword.set($event)"
                required />

              @if (confirmPassword().length > 0 && !passwordsMatch()) {
                <p class="field-error">Passwords do not match</p>
              }
            </div>

          </div>

          <sh3-button
            variant="solid"
            size="lg"
            type="submit"
            [disabled]="!formValid() || loading()"
            (clicked)="onReset()">Reset password</sh3-button>

        </form>

      } @else {

        <div class="error-message">
          <h2 class="auth-title">Invalid reset link</h2>
          <p class="auth-subtitle">This password reset link is invalid or has expired. Please request a new one.</p>
        </div>

      }

      <p class="auth-footer">
        <a routerLink="/login" class="auth-link">Back to sign in</a>
      </p>

    </div>
  </main>

</div>
