<div class="login-page">

  <!-- ── Left: brand panel ── -->
  <aside class="brand-panel">
    <div class="brand-inner">

      <div class="brand-illustration">
        <!--
          Border Collie — schematic front-facing head, line-art only.
          One outline path (head + two alert ears) + eyes + nose.
        -->
        <!-- Angular dog head: wide cheeks, narrow skull, tall sharp ears -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 84"
             class="bc-svg" aria-label="Shepherd dog" role="img"
             fill="none" stroke="currentColor"
             stroke-linecap="round" stroke-linejoin="round">
          <!-- Head + ears: all sharp angles, no curves -->
          <path stroke-width="2.4"
                d="M 40 80
                   L 26 70 L 12 46 L 18 26
                   L 24 20 L 22 2 L 32 18
                   L 40 14
                   L 48 18 L 58 2 L 56 20
                   L 62 26 L 68 46 L 54 70
                   Z"/>
          <!-- Eyes -->
          <circle cx="26" cy="42" r="4"  stroke-width="2"/>
          <circle cx="54" cy="42" r="4"  stroke-width="2"/>
          <!-- Pupils -->
          <circle cx="26" cy="42" r="2"  fill="currentColor" stroke="none"/>
          <circle cx="54" cy="42" r="2"  fill="currentColor" stroke="none"/>
          <!-- Muzzle stop line -->
          <line x1="24" y1="54" x2="56" y2="54" stroke-width="1.5" opacity="0.5"/>
          <!-- Nose -->
          <ellipse cx="40" cy="64" rx="6" ry="3.5" stroke-width="2"/>
        </svg>
      </div>

      <div class="brand-text">
        <h1 class="brand-name">SHEPHERD</h1>
        <p class="brand-tagline">never be lost again</p>
      </div>

    </div>
  </aside>

  <!-- ── Right: auth panel ── -->
  <main class="auth-panel">
    <div class="auth-inner">

      <div class="auth-logo">
        <!-- Same schematic head, small -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 84"
             width="24" height="26" aria-hidden="true"
             fill="none" stroke="currentColor"
             stroke-linecap="round" stroke-linejoin="round">
          <path stroke-width="5"
                d="M 40 80 L 26 70 L 12 46 L 18 26
                   L 24 20 L 22 2 L 32 18 L 40 14
                   L 48 18 L 58 2 L 56 20
                   L 62 26 L 68 46 L 54 70 Z"/>
          <circle cx="26" cy="42" r="4"  stroke-width="4.5"/>
          <circle cx="54" cy="42" r="4"  stroke-width="4.5"/>
          <circle cx="26" cy="42" r="2"  fill="currentColor" stroke="none"/>
          <circle cx="54" cy="42" r="2"  fill="currentColor" stroke="none"/>
          <ellipse cx="40" cy="64" rx="6" ry="3.5" stroke-width="4"/>
        </svg>
        <span class="auth-logo-name">SHEPHERD</span>
      </div>

      <div class="auth-header">
        <h2 class="auth-title">Welcome back</h2>
        <p class="auth-subtitle">Sign in to your workspace to continue.</p>
      </div>

      <app-login-form (login)="onLogin($event)" />

      <p class="auth-footer">
        Need access?&nbsp;<a href="mailto:admin&#64;shepherd.app" class="auth-link">Contact your administrator</a>
      </p>

    </div>
  </main>

</div>
