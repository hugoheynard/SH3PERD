<div class="page-back-bar">
  <button class="btn-back" (click)="goBack()" type="button">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Companies
  </button>
</div>

<!-- Loading state -->
@if (store.loading()) {
  <div class="loading-state">
    <span>Loading company...</span>
  </div>
}

<!-- Error state -->
@if (store.error()) {
  <div class="error-state">
    <span>{{ store.error() }}</span>
  </div>
}

<!-- Main layout -->
@if (!store.loading() && store.hasCompany()) {
  @let c = store.company()!;

  <div class="company-page">
    <app-company-header
      [name]="c.name"
      [status]="c.status"
      [nodeCount]="c.activeTeamCount"
      [contractCount]="c.activeContractCount"
      (settingsClicked)="goToSettings()"
    />

    <!-- Body -->
    <div class="company-body">

      <!-- Tab bar -->
      <div class="tab-bar">
        <button class="tab-btn" [class.active]="activeTab() === 'orgchart'" (click)="setTab('orgchart')">Organigramme</button>
        <button class="tab-btn" [class.active]="activeTab() === 'contracts'" (click)="setTab('contracts')">Contracts</button>
      </div>

      @if (activeTab() === 'orgchart') {
        <app-orgchart-tab [companyId]="c.id" />
      }

      @if (activeTab() === 'contracts') {
        <app-contracts-tab [companyId]="c.id" />
      }

    </div>
  </div>
}
