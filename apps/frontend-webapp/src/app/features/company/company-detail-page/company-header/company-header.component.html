<header class="company-header">
  <div class="header-info">
    <sh3-avatar [name]="name()" [colorSeed]="companyId()" [square]="true" size="lg" />
    <h1 class="company-name">{{ name() }}</h1>
  </div>

  <div class="header-stats">
    <span class="stat">
      <span class="stat-value">{{ nodeCount() }}</span>
      <span class="stat-label">nodes</span>
    </span>
    <span class="stat">
      <span class="stat-value">{{ contractCount() }}</span>
      <span class="stat-label">contracts</span>
    </span>
  </div>

  <sh3-status-badge [status]="status()" />
</header>
