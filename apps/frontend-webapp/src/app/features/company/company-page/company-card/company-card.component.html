<button class="company-card" (click)="clicked.emit(company().id)" type="button">
  <sh3-avatar [name]="company().name" [colorSeed]="company().id" [square]="true" size="lg" />
  <div class="card-body">
    <span class="card-name">{{ company().name }}</span>
    <span class="card-meta">{{ formatDate(company().createdAt) }}</span>
    <sh3-status-badge [status]="company().status" />
  </div>
  <sh3-icon name="chevron-right" [size]="14" class="card-chevron" />
</button>
