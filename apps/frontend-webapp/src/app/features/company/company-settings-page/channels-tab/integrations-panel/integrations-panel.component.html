<section class="integrations">
  <h3 class="section-title">Platforms</h3>

  <div class="integration-list">
    @for (p of platforms; track p.key) {
      <div class="integration-card" [class.is-connected]="isConnected(p.key)" [class.is-locked]="!p.feature_unlocked">
        <div class="integration-icon" [attr.data-platform]="p.key">
          <app-platform-icon [platform]="p.key" />
        </div>

        <div class="integration-body">
          <span class="integration-name">{{ p.label }}</span>
          <span class="integration-desc">{{ p.description }}</span>
        </div>

        <div class="integration-actions">
          @if (!p.feature_unlocked) {
            <span class="status-badge coming-soon">Coming soon</span>
          } @else if (isConnected(p.key)) {
            <span class="status-badge connected">Connected</span>
            <button class="btn-icon btn-disconnect" (click)="disconnect(p.key)" title="Disconnect">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
          } @else {
            <sh3-button variant="primary" size="sm" (clicked)="oauthRequested.emit(p.key)">Connect</sh3-button>
          }
        </div>
      </div>
    }
  </div>
</section>
