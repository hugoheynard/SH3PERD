<nav class="settings-nav">
  @for (item of items; track item.key) {
    <button
      class="nav-item"
      [class.active]="activeTab() === item.key"
      (click)="tabChange.emit(item.key)"
    >
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
        <path [attr.d]="item.icon"/>
      </svg>
      {{ item.label }}
    </button>
  }
</nav>
