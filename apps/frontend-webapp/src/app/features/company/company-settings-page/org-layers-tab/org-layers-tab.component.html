<div class="tab-panel">
  <h2 class="panel-title">Hierarchy labels</h2>
  <p class="panel-subtitle">
    Define the vocabulary for each level of your org chart.
    Level 0 = root nodes, Level 1 = their children, etc.
  </p>

  @for (layer of editLayers(); track $index) {
    <div class="layer-row">
      <span class="layer-depth-badge">{{ $index }}</span>
      <input
        class="form-input"
        type="text"
        [value]="layer"
        (input)="onLayerInput($index, $event)"
        [placeholder]="'e.g. ' + ($index === 0 ? 'Direction' : $index === 1 ? 'Pôle' : 'Équipe')"
      />
      <button class="btn-remove-layer" (click)="removeLayer($index)" title="Remove level" [disabled]="editLayers().length <= 1">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
  }

  <button class="btn-add-layer" (click)="addLayer()">+ Add level</button>

  <div class="form-actions">
    <button class="btn-save" (click)="save()">Save labels</button>
  </div>
</div>
