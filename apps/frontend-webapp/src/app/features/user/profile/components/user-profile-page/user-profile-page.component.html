<div class="profile-page">

  <!-- ── Avatar header (always visible) ──────────── -->
  <section class="profile-header">
    <div class="avatar-circle">
      <span class="avatar-initials">{{ userInitial() }}</span>
    </div>
    <div class="avatar-info">
      <span class="avatar-name">{{ userFullName() }}</span>
      <span class="avatar-hint">JPG, PNG — max 5 Mo</span>
      <sh3-button variant="ghost" size="sm" class="avatar-upload-btn">Change photo</sh3-button>
    </div>
  </section>

  <!-- ── Tabbed settings ─────────────────────────── -->
  <div class="settings-inline">
    <sh3-tab-nav
      [tabs]="settingsTabs"
      [activeKey]="activeTab()"
      activeStyle="fill"
      direction="vertical"
      (tabChange)="activeTab.set($event)"
    />
    <div class="settings-content">
      @if (activeTab() === Tab.PROFILE) {
        <app-profile-info-tab />
      }
      @if (activeTab() === Tab.PLAN_USAGE) {
        <div class="tab-panel">
          <sh3-plan-usage />
        </div>
      }
      @if (activeTab() === Tab.DANGER_ZONE) {
        <app-user-danger-zone-tab />
      }
    </div>
  </div>

</div>
