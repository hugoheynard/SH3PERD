<div class="flex items-center gap-6 p-6 bg-surface rounded-lg shadow-md">
  <!-- Avatar -->
  <div class="relative">
    <img src="https://ui-avatars.com/api/?name=John+Doe" alt="Avatar"
      class="w-24 h-24 rounded-full object-cover shadow-sm"
    />

    <!-- Button overlay (edit) -->
    <label
      for="avatar-upload"
      class="absolute bottom-0 right-0 bg-primary text-white w-8 h-8 rounded-full flex items-center justify-center cursor-pointer shadow-md hover:bg-primary-dark transition"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
        <path d="M4 13.5V16h2.5l7.29-7.29-2.5-2.5L4 13.5zM17.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34a1.003 1.003 0 00-1.42 0L12 4.59l3.75 3.75 1.96-1.3z"/>
      </svg>
    </label>

    <input id="avatar-upload" type="file" class="hidden" />
  </div>

  <!-- Text + actions -->
  <div class="flex flex-col">
    <h3 class="text-text text-xl font-semibold">Photo de profil</h3>
    <p class="text-text-secondary mt-1">
      JPG, PNG — max 5 Mo
    </p>

    <button
      class="mt-4 px-lg py-sm bg-primary text-white rounded-md shadow-sm hover:bg-primary-dark transition"
    >
      Choisir une photo
    </button>
  </div>
</div>

<div id="personalSection" class="section rounded-lg shadow-md">
  <div class="sectionHeader">
    <h2>Personal informations</h2>
    <sh3-button-tertiary buttonLabel="edit" (click)="onToggleUpEditMode()" />
  </div>


  <form [formGroup]="getProfileForm()" class="grid grid-cols-1 md:grid-cols-2 gap-lg">
    <sh3-input type="text" label="first name" formControlName="first_name"/>
    <sh3-input type="text" label="last name" formControlName="last_name"/>
    <sh3-input type="text" label="display name" formControlName="display_name"/>
    <sh3-input type="text" label="phone" formControlName="phone"/>

    @if (upEditMode) {
      <sh3-button-primary buttonLabel="submit" (click)="onSubmitProfile()" />
    }
  </form>
</div>

<div id="credentialsSection" class="section rounded-lg shadow-md">
  <div class="sectionHeader">
    <h2>Password</h2>
    <sh3-button-tertiary buttonLabel="change password"  (click)="onTogglePasswordEditMode()" />
  </div>
  <form>

  </form>
</div>
