<div class="form" (keydown)="onKeydown($event)">

  <!-- Label + duration + bpm -->
  <div class="form-row form-row--main">
    <sh3-input
      class="form-input--label"
      size="sm"
      [ngModel]="label()"
      (ngModelChange)="label.set($event)"
      placeholder="Version name…"
      [autofocus]="true"
    />
    <sh3-input
      class="form-input--dur"
      size="sm"
      align="center"
      type="number"
      [min]="1"
      [ngModel]="duration()"
      (ngModelChange)="duration.set($event)"
      placeholder="min"
    />
    <sh3-input
      class="form-input--bpm"
      size="sm"
      align="center"
      type="number"
      [min]="1"
      [ngModel]="bpm()"
      (ngModelChange)="bpm.set($event)"
      placeholder="BPM"
    />
  </div>

  <!-- Genre pills -->
  <div class="genre-row">
    @for (g of genres; track g) {
      <button
        class="genre-pill"
        type="button"
        [class.selected]="genre() === g"
        (click)="genre.set(g)"
      >{{ g }}</button>
    }
  </div>

  <!-- Ratings -->
  <div class="ratings-row">
    @for (row of rows; track row.key) {
      <div class="rating-col">
        <span class="rating-label">{{ row.label }}</span>
        <div class="rating-dots">
          @for (dot of ratingDots; track dot) {
            <button
              class="dot"
              type="button"
              [class.filled]="dot <= ratingSignals[row.key]()"
              [attr.data-level]="ratingLevel(ratingSignals[row.key]())"
              (click)="setRating(row.key, dot)"
            ></button>
          }
        </div>
      </div>
    }
  </div>

  <!-- Actions -->
  <div class="form-actions">
    <sh3-button variant="ghost" size="sm" (clicked)="cancel()">Cancel</sh3-button>
    <sh3-button variant="primary" size="sm" [disabled]="!canSubmit()" (clicked)="submit()">Add version</sh3-button>
  </div>

</div>
