<ng-container *ngIf="data as d; else addRepertoire">
  <ng-container *ngIf="isComplete(d); else addRepertoire">
    <div id="repertoireTagContainer">
      <sh3-tag [text]="String(d.energy)"   variant="primary" icon="lightning" />
      <sh3-tag [text]="String(d.effort)"   variant="primary" icon="fire" />
      <sh3-tag [text]="String(d.affinity)" variant="primary" icon="heart" />
      <sh3-tag [text]="String(d.mastery)"  variant="primary" icon="award" />
    </div>
  </ng-container>
</ng-container>

<ng-template #addRepertoire>
  <sh3-button-secondary buttonLabel="addRepertoireEntry" (clicked)="addEntry()" />
</ng-template>
