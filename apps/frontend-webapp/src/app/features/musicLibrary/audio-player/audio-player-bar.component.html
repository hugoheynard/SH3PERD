<!--
  Global audio player bar.
  Hidden entirely (host class) when no track is loaded — the layout
  reclaims the vertical space on empty state.
-->
<div class="audio-bar" [class.is-empty]="!player.hasTrack()">

  @if (player.currentTrack(); as track) {

    <!-- Transport controls -->
    <div class="audio-bar-transport">
      <button
        class="audio-btn"
        type="button"
        [disabled]="!player.canGoPrevious()"
        (click)="onPreviousClick()"
        title="Previous (P)"
      >
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 6h2v12H6zM9.5 12l8.5 6V6z"/>
        </svg>
      </button>

      <button
        class="audio-btn audio-btn--primary"
        type="button"
        (click)="onPlayPauseClick()"
        [disabled]="player.isLoading()"
        [title]="player.isPlaying() ? 'Pause (Space)' : 'Play (Space)'"
      >
        @if (player.isLoading()) {
          <span class="audio-spinner" aria-hidden="true"></span>
        } @else if (player.isPlaying()) {
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 4h4v16H6zM14 4h4v16h-4z"/>
          </svg>
        } @else {
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
        }
      </button>

      <button
        class="audio-btn"
        type="button"
        [disabled]="!player.canGoNext()"
        (click)="onNextClick()"
        title="Next (N)"
      >
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/>
        </svg>
      </button>
    </div>

    <!-- Track metadata -->
    <div class="audio-bar-meta">
      <div class="audio-bar-title" [title]="getTrackTitle(track)">
        {{ getTrackTitle(track) }}
      </div>
      @if (getTrackSubtitle(track); as subtitle) {
        <div class="audio-bar-subtitle" [title]="subtitle">{{ subtitle }}</div>
      }
    </div>

    <!-- Waveform + markers -->
    <div class="audio-bar-wave">
      <span class="audio-bar-time audio-bar-time--left">{{ positionLabel() }}</span>

      <div class="audio-bar-wave-host" (click)="onWaveformClick($event)">
        <div #waveformHost class="audio-bar-wave-surface"></div>

        <!-- Loudness / clipping overlays computed from the analysis snapshot -->
        @for (marker of markers(); track marker.kind + marker.leftPct) {
          <div
            class="audio-bar-marker"
            [class.audio-bar-marker--clipping]="marker.kind === 'clipping'"
            [class.audio-bar-marker--loudest]="marker.kind === 'loudest'"
            [style.left.%]="marker.leftPct"
            [style.width.%]="marker.widthPct"
            [title]="marker.label"
          ></div>
        }

        <!-- Loading veil -->
        @if (player.isLoading()) {
          <div class="audio-bar-loading-veil" aria-hidden="true"></div>
        }
      </div>

      <span class="audio-bar-time audio-bar-time--right">{{ durationLabel() }}</span>
    </div>

    <!-- Volume + loop + close -->
    <div class="audio-bar-aux">
      <button
        class="audio-btn"
        type="button"
        (click)="onLoopClick()"
        [class.is-active]="player.loopMode() !== 'off'"
        [title]="getLoopLabel()"
      >
        @if (player.loopMode() === 'one') {
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 2l4 4-4 4"/>
            <path d="M3 11v-1a4 4 0 014-4h14"/>
            <path d="M7 22l-4-4 4-4"/>
            <path d="M21 13v1a4 4 0 01-4 4H3"/>
            <text x="12" y="15" font-size="7" font-weight="700" text-anchor="middle" fill="currentColor" stroke="none">1</text>
          </svg>
        } @else {
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 2l4 4-4 4"/>
            <path d="M3 11v-1a4 4 0 014-4h14"/>
            <path d="M7 22l-4-4 4-4"/>
            <path d="M21 13v1a4 4 0 01-4 4H3"/>
          </svg>
        }
      </button>

      <button
        class="audio-btn"
        type="button"
        (click)="onMuteClick()"
        [title]="player.muted() ? 'Unmute (M)' : 'Mute (M)'"
      >
        @if (player.muted() || player.volume() === 0) {
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 5L6 9H2v6h4l5 4z"/>
            <line x1="23" y1="9" x2="17" y2="15"/>
            <line x1="17" y1="9" x2="23" y2="15"/>
          </svg>
        } @else {
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 5L6 9H2v6h4l5 4z"/>
            <path d="M15.54 8.46a5 5 0 010 7.07"/>
            <path d="M19.07 4.93a10 10 0 010 14.14"/>
          </svg>
        }
      </button>

      <input
        class="audio-volume"
        type="range"
        min="0"
        max="1"
        step="0.01"
        [value]="player.muted() ? 0 : player.volume()"
        (input)="onVolumeInput($event)"
        title="Volume"
      />

      <button
        class="audio-btn"
        type="button"
        (click)="onStopClick()"
        title="Close player"
      >
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
  }
</div>
