<ui-popover-frame width="320px">
  <span popover-title>Tab limit reached</span>

  <p popover-body class="tab-limit-popover__text">
    You've reached the maximum number of tabs for your plan.
    <br/>Unlock more with Pro or Max.
  </p>

  <div popover-footer class="tab-limit-popover__footer">
    <sh3-button variant="primary" size="sm" (clicked)="onUpgrade()">Upgrade</sh3-button>
  </div>
</ui-popover-frame>
