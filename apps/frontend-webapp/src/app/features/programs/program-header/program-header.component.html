<div class="header-left">
  <div class="program-title">
    <input
      class="title-input"
      type="text"
      [ngModel]="state.name()"
      (ngModelChange)="state.changeProgramName($event)"
    />
  </div>

  <div class="program-time">
    <label>
      <span class="label-text">Start</span>
      <input
        type="time"
        [ngModel]="state.startTime()"
        (ngModelChange)="state.changeStartTime($event)"
      />
    </label>

    <span class="separator">→</span>

    <label>
      <span class="label-text">End</span>
      <input
        type="time"
        [ngModel]="state.endTime()"
        (ngModelChange)="state.changeEndTime($event)"
      />
    </label>
  </div>
</div>



<!-- Floating menu for program actions -->
<div class="program-actions"
     [class.visible]="true"
     [class.saved]="isSaved">

  <div class="action-bar">

    <button
      class="icon-btn"
      (click)="state.addRoom()"
      aria-label="Add room">
      ＋
    </button>

    <div class="divider"></div>

    <!-- Mode Switch between manual and assisted by backend -->
    <div class="mode-switch">

      <div
        class="mode-indicator"
        [class.assisted]="state.mode() === 'assisted'">
      </div>

      <button
        (click)="state.changeProgramMode('manual')"
        [class.active]="state.mode() === 'manual'">
        Manual
      </button>

      <button
        (click)="state.changeProgramMode('assisted')"
        [class.active]="state.mode() === 'assisted'">
        Assisted
      </button>

    </div>

    <button
      class="icon-btn primary"
      (click)="onSaveClick()"
      aria-label="Save program">

      @if (!isSaved) {
        ✓
      } @else {
        ✓
      }
    </button>

    <div class="divider"></div>

    <!-- Export PDF -->
    <button
      class="icon-btn pdf"
      (click)="exportPdf.emit()"
      aria-label="Export PDF">
      ⎙
    </button>

  </div>

  @if (isSaved) {
    <div class="saved-label">
      Saved
    </div>
  }

</div>
