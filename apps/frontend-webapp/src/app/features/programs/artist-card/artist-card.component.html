<ui-card-frame-horizontal class="artist-card" [dragIcon]="true">

  <div card-left class="artist-avatar" [style.background]="artist().roleColor">{{ initials }}</div>

  <div card-content class="artist-main">

    <div class="artist-meta">
      <div class="artist-name">{{ artist().name }}</div>
      <div class="artist-role">{{ artist().role }}</div>
    </div>

    <app-artist-workload-strip
      [segments]="workload().segments"
      [globalScore]="78"/>

  </div>
</ui-card-frame-horizontal>
