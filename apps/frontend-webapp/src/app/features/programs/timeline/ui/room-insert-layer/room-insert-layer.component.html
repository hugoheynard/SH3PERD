<!-- Layer for insert line and element preview -->
@if (indicator()) {

  <ui-insert-line
    [top]="insertTopPx()!"
    [showButton]="isAltMode()"
  />

}


@let ghost = ghostRender();
@if (ghost) {
  <ng-container
    *ngComponentOutlet="ghost.component; inputs: ghost.inputs">
  </ng-container>
}
