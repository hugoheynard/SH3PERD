@if (indicator()) {
  <ui-insert-line
    [top]="insertTopPx()!"
    [showButton]="isAltMode()"
  />
}


<!-- Ghost elements for drag preview -->

@let slot = ghostSlot();

@if (slot) {
  <ui-program-slot class="ghost" [slot]="slot" />
}

@let cue = ghostCue();

@if (cue) {
  <ui-timeline-cue class="ghost" [cue]="cue" />
}

@let buffer = ghostBuffer();

@if (buffer) {
  <ui-buffer-slot class="ghost" [buffer]="buffer" />
}
