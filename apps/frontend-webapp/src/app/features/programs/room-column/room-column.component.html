@let r = room();

<div class="room-column"  [class.active]="hoveredRoom() === r.id">
  <div class="room-header">

    <div class="room-header-left">
      <span class="room-name">{{ r.name }}</span>
    </div>

    <div class="room-header-actions">

      <button class="room-options">⋯</button>

      @if (!roomServ.isBaseRoom(r)) {
        <button
          class="room-delete"
          (click)="roomServ.removeRoom(r.id)">
          ✕
        </button>
      }

    </div>
  </div>

  <div class="header-separator"></div>

  <div
    class="room-timeline"

    uiRoomLayout
    [roomId]="r.id"

    uiDndDropZone
    [dropZone_id]="r.id"
    [dropZoneAccept]="['template','slot']"
    (uiDndDrop)="handleRoomDrop($event)"

    [attr.data-room-id]="r.id"
    [style.height.px]="timelineHeight()"
    [style.background-position]="'0px -' + gridOffsetPx() + 'px'">

    <ng-content />

    @if (indicator()) {
      <ui-insert-line
        [top]="insertTopPx()!"
        [showButton]="isAltMode()"
        (add)="handleInsert()"
      />
    }

  </div>
</div>
