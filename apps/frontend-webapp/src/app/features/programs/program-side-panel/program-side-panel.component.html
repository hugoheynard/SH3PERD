<div class="panel-header">
  Program Tools
</div>

<!-- Templates -->
<div class="panel-section">
  <div class="section-header">
    <span>Slot Templates</span>
    <button class="section-action" (click)="openCreateTemplate()">+ New</button>
  </div>

  <div class="template-list">
    @for (template of config.templates; track template.id) {
      <app-slot-template-card [template]="template" (pointerdown)="onTemplateDrag(template)" />
    }
  </div>
</div>


<div class="panel-section">
  <div class="section-header">
    <span>Artists</span>
  </div>

  @for(artist of config.artists; track artist.id) {
  <div
    class="template-item"
    (mousedown)="config.onArtistDragStart(artist)">
    {{ artist.name }}
  </div>
  }

</div>
