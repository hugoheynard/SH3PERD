<div
  class="radial-menu"
  [class.open]="open()">

  @for (item of computedItems(); track item.type) {

    <button
      class="radial-item"
      [style]="{
      '--x': item.x,
      '--y': item.y
      }"
      (mouseenter)="onHover(item.type)"
      (mouseleave)="onLeave()"
      (click)="onSelect(item.type)">
      {{ item.label }}
    </button>
  }

</div>
