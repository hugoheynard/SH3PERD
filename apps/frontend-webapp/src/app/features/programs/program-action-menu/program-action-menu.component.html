<div class="program-actions"
     [class.visible]="true"
     [class.saved]="isSaved">

  <div class="action-bar">

    <button
      class="icon-btn"
      (click)="roomServ.addRoom()"
      aria-label="Add room">
      ＋
    </button>

    <div class="divider"></div>

    <!-- Mode Switch between manual and assisted by backend -->
    <div class="mode-switch">

      <div
        class="mode-indicator"
        [class.assisted]="selector.mode() === 'assisted'">
      </div>

      <button
        (click)="settings.changeProgramMode('manual')"
        [class.active]="selector.mode() === 'manual'">
        Manual
      </button>

      <button
        (click)="settings.changeProgramMode('assisted')"
        [class.active]="selector.mode() === 'assisted'">
        Assisted
      </button>

    </div>

    <button
      class="icon-btn primary"
      (click)="onSaveClick()"
      aria-label="Save program">

      @if (!isSaved) {
        ✓
      } @else {
        ✓
      }
    </button>

    <div class="divider"></div>

    <!-- Export PDF -->
    <button
      class="icon-btn pdf"
      (click)="exportPdf.emit()"
      aria-label="Export PDF">
      ⎙
    </button>

  </div>

  @if (isSaved) {
    <div class="saved-label">
      Saved
    </div>
  }

</div>
