<ui-popover-frame>

  <div popover-title>
    <span>{{ mode === 'edit' ? 'Edit' : 'Create' }} template</span>
  </div>

  <form
    popover-body
    class="form"
    [formGroup]="form"
    (ngSubmit)="submit()">

    <!-- Title -->
    <div class="form-field">
      <label class="form-label">Title</label>
      <input
        type="text"
        class="form-input"
        placeholder="Opening set"
        formControlName="title"
      />
    </div>

    <!-- Duration -->
    <div class="form-field">
      <label class="form-label">Duration (minutes)</label>
      <input
        type="number"
        class="form-input"
        min="5"
        step="5"
        formControlName="duration"
      />
    </div>

    <!-- Color -->
    <div class="form-field">
      <label class="form-label">Color</label>

      <div class="color-row">
        <input
          type="color"
          class="color-picker"
          formControlName="color"
        />

        <input
          type="text"
          class="form-input color-code"
          formControlName="color"
        />
      </div>
    </div>

    <div class="form-field">

      <label class="form-label">Music</label>

      <div class="checkbox-group">

        <label class="checkbox">
          <input
            type="checkbox"
            formControlName="playlist"
          />
          <span>Playlist</span>
        </label>

        <label class="checkbox">
          <input
            type="checkbox"
            formControlName="singleTrack"
          />
          <span>Single Track</span>
        </label>

      </div>

    </div>

    @if (form.errors?.['musicConflict']) {
      <div class="form-error">
        Cannot select playlist and single track at the same time.
      </div>
    }

  </form>

  <div popover-footer>
    <ui-button variant="secondary">Cancel</ui-button>

    <ui-button type="submit">
      {{ mode === 'edit' ? 'Save' : 'Create' }}
    </ui-button>
  </div>

</ui-popover-frame>
