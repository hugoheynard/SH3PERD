<ui-card-frame [dragIcon]="true" (pointerdown)="dragStart.emit(template())">

  <div card-left class="template-accent" [style.background]="template().color"></div>

  <div card-content>
    <div class="template-title">{{ template().type }}</div>
    <div class="template-meta">{{ template().duration }} min</div>
  </div>

  <div card-actions>
    <ui-button
      [variant]="'tertiary'"
      type="button"
      (pointerDown)="onEdit($event)">edit</ui-button>
  </div>

</ui-card-frame>
