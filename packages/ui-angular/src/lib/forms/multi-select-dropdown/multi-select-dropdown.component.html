
<div class="custom-select">
  <div class="select-label" (click)="toggleDropdown()">
    {{ selectedLabels.length ? selectedLabels.join(', ') : placeholder() }}
  </div>

  <div class="dropdown" [class.open]="dropdownOpen" *ngIf="dropdownOpen" (click)="$event.stopPropagation()">
    <label class="dropdown-select-all">
      <input
        type="checkbox"
        [checked]="isAllSelected()"
        (click)="$event.stopPropagation()"
        (change)="onSelectAllCheckboxChange($event)"
      />
      {{ isAllSelected() ? 'Unselect all' : 'Select all' }}
    </label>

    <label *ngFor="let option of options">
      <input type="checkbox"
             [checked]="isSelected(option?.[valueKey])"
             (click)="$event.stopPropagation()"
             (change)="onCheckboxChange($event, option?.[valueKey])" />
      {{ option[labelKey] }}
    </label>
  </div>
</div>
