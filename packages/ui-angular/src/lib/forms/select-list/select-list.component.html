<div
  class="selectList"
  tabindex="0"
  aria-label="Selectable list"
>
  <ng-container *ngIf="items.length; else customEmpty">
    <div
      *ngFor="let item of items"
      class="entry"
      [class.selected]="isSelected(item)"
      [class.disabled]="isDisabled(item)"
      (click)="!isDisabled(item) && onSelect(item)"
    >
      {{ labelFn(item) }}
    </div>
  </ng-container>
</div>

<ng-template #customEmpty>
  <ng-container *ngTemplateOutlet="emptyTemplate || defaultEmpty" />
</ng-template>

<ng-template #defaultEmpty>
  <div class="empty-state">No Match found.</div>
</ng-template>
