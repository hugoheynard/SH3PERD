<label [attr.for]="inputId" >{{ label() }}</label>

@if (control) {
  <div class="input-wrapper ">
    <input
      [id]="inputId"
      [attr.type]="type()"
      [attr.min]="min() !== null ? min() : null"
      [attr.max]="max() !== null ? max() : null"
      [attr.disabled]="disabled || null"
      [formControl]="control" />

    @if (type() === 'number') {
      <div class="number-controls">
        <button type="button" class="btn-inc" (click)="increment()" [disabled]="disabled">+</button>
        <button type="button" class="btn-dec" (click)="decrement()" [disabled]="disabled">−</button>
      </div>
    }
  </div>
}

@else {
  <div class="input-wrapper" >
    <input
      [id]="inputId"
      [attr.type]="type()"
      [attr.min]="min()"
      [attr.max]="max()"
      [value]="value"
      tabindex="0"
      [attr.disabled]="disabled || null"
      (input)="onInputChange($event)"
      (blur)="onTouched()" />

    @if (type() === 'number') {
      <div class="number-controls">
        <button type="button" class="btn-inc" (click)="increment()" [disabled]="disabled">+</button>
        <button type="button" class="btn-dec" (click)="decrement()" [disabled]="disabled">−</button>
      </div>
    }
  </div>
}
