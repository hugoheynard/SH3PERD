<label class="checkbox-container">
  <input
    type="checkbox"
    class="native-checkbox"
    [checked]="value"
    (change)="onCheckboxChange($event)"
    [disabled]="disabled"
  />
  <span class="custom-checkbox">
    <svg viewBox="0 0 24 24">
      <polyline points="4 12 9 17 20 6" />
    </svg>
  </span>
  <span class="checkbox-label">{{ label }}</span>
</label>
