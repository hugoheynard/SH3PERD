<div class="trackLine">
  <mat-icon>drag_handle</mat-icon>

  <span *ngIf="song.id; else noSong">{{ song.title }}</span>
  <ng-template #noSong>
    <open-music-lib-button [pldServ]="pldServ"/>
  </ng-template>

  <!--NEW-->
  <div class="tagDropZone"
       cdkDropList
       [id]="tagDropZoneId"
       [cdkDropListData]="song.tags"
       [cdkDropListConnectedTo]="getConnections()"
       (cdkDropListDropped)="onTagDropped($event)">

    <mat-chip *ngFor="let tag of song.tags"
              cdkDrag
              [cdkDragData]="{
                tag: tag,
                source: 'trackLine',
                fromSong: song
                }">
      {{ tag }}
    </mat-chip>
  </div>

  <button mat-icon-button (click)="toggleExpand()">
    <mat-icon>{{ expandedTrack ? 'expand_less' : 'expand_more' }}</mat-icon>
  </button>

</div>

<div class="expandedTrack" *ngIf="expandedTrack">
  <div class="flexRowSpaceBetween">
    <div><mat-icon>person</mat-icon> Performers</div>
    <mat-chip-set
      class="example-chip"
      cdkDropList
      cdkDropListOrientation="horizontal">
      @for (performer of compatiblesPerformers; track performer.name) {
        <mat-chip class="example-box" cdkDrag>{{performer.name}}</mat-chip>
      }
    </mat-chip-set>
    <button>+</button>
  </div>


</div>
