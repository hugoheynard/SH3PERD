<form #credentials="ngForm" (ngSubmit)="onSubmit(credentials)">
  <h1>Login</h1>
  <mat-form-field>
    <mat-label>Email</mat-label>
    <input
      type="email"
      placeholder="email"
      matInput
      name="email"
      ngModel>
  </mat-form-field>

  <mat-form-field>
    <mat-label>Password</mat-label>
    <input
      type="password"
      placeholder="password"
      matInput
      name="password"
      ngModel>

  </mat-form-field>



  <button mat-raised-button type="submit">login</button>
</form>
