<table id="versionTable">
    <thead>
      <tr>
        <td id="type">Type</td>
        <td id="pitch">Pitch</td>
        <td id="genre">Genre</td>
        <td id="energy">Energy</td>
        <td id="effort">Effort</td>
        <td id="emergency">Emergency</td>
      </tr>
      </thead>
    <tbody *ngFor="let version of versions; let i = index" class="tr">
      <tr>
        <!-- each line is a form -->
        <ng-container [formGroup]="forms[i]">
          <td class="td">
            <select formControlName="type">
              <option value="original">original</option>
              <option value="acoustic">acoustic</option>
              <option value="cover">cover</option>
              <option value="remix">remix</option>
            </select>
          </td>
          <td><input type="number" formControlName="pitch" min="-12" max="12"></td>
          <td>
            <select formControlName="genre">
              <option>pop</option>
              <option>rock</option>
              <option>jazz</option>
              <option>electro</option>
              <option>disco/soul</option>
            </select>
          </td>
          <td>
            <select formControlName="energy">
              <option>slow</option>
              <option>mid</option>
              <option>up-mid</option>
              <option>high</option>
            </select>
          </td>
          <td>
            <select formControlName="effort">
              <option>low</option>
              <option>mid</option>
              <option>high</option>
            </select>
          </td>
          <td>
            <input type="checkbox" formControlName="emergency">
          </td>
          <td>
            <button mat-icon-button class="buttonsForm" (click)="toggleFileUpload(i)">
              <mat-icon>library_music</mat-icon>
            </button>
            <button mat-icon-button class="buttonsForm" type="submit">
              <mat-icon>save</mat-icon>
            </button>
          </td>
        </ng-container>
      </tr>
      <tr *ngIf="expandedIndex === i">
        <app-file-management [i]="i"/>
      </tr>
    </tbody>
</table>
