<td colspan="7">
  <div class="file-upload">
    <label for="fileInput-{{ i }}">Choose a file:</label>
    <input type="file" id="fileInput-{{ i }}"
           (change)="handleFileUpload($event, i)">
    <button (click)="confirmFileUpload(i)">Confirm</button>
    <button (click)="cancelFileUpload()">Cancel</button>
  </div>
</td>
