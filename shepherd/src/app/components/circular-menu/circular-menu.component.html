<div class="overlay" *ngIf="isOpen()" (click)="close()"></div>

<div class="grid-menu" *ngIf="isOpen()">
  <button class="menu-item" (click)="toggle()"><mat-icon class="menu-icon">clear</mat-icon></button>
  <button
    class="menu-item"
    *ngFor="let item of menuItems; let i = index"
    (click)="navigate(item.route)"
    [ngStyle]="{ '--i': i }"
  >
    <mat-icon class="menu-icon">{{ item.iconName }}</mat-icon>
  </button>
</div>
