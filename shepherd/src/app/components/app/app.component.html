<ng-container *ngIf="!authService.isAuthenticatedSignal()">
  <section class="content">
    <router-outlet />
  </section>
</ng-container>


<ng-container *ngIf="authService.isAuthenticatedSignal()">
  <app-header />
  <mat-sidenav-container>
    <mat-sidenav #leftMenuSidenav mode="side" opened>
      <app-appMenu
        [menuItems]="[
          { iconName: 'home', action:  routeService.navigateToHome.bind(routeService) },
          { iconName: 'calendar_clock', action: routeService.navigateToCalendar.bind(routeService) },
          { iconName: 'library_music', action: routeService.navigateToCalendar.bind(routeService) },
          { iconName: 'logout', action: authService.logout.bind(authService) }
        ]"
      />
    </mat-sidenav>

    <section class="content">
      <router-outlet />
    </section>

  </mat-sidenav-container>

  <app-footer />

</ng-container>
