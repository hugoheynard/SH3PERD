<form [formGroup]="weekSettingsForm" (ngSubmit)="onSubmit()">

  <div class="settingPageHeader">
    <h2>Week settings</h2>
    <button mat-icon-button type="submit" [disabled]="weekSettingsForm.invalid">
      <app-edit-save-icon [isModified]="isModified"/>
    </button>
  </div>

  <mat-tab-group>
    <mat-tab *ngFor="let day of weekDays; let i = index" [label]="day">
      <app-day-template [dayForm]="getDayFormGroup(i)" />
    </mat-tab>
  </mat-tab-group>

</form>
