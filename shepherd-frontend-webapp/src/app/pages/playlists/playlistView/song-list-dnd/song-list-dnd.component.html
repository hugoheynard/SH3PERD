<!-- Description: This is the html file for the song-list-dnd component.
This component is used to display the list of songs in a playlist.
It uses the cdkDropList and cdkDrag directives to allow the user to drag and drop songs to rearrange them.
It also includes the track-line component to display the details of each song. -->

<div cdkDropList
     [cdkDropListData]="songList.controls"
     class="song-list"
     (cdkDropListDropped)="dropSong($event)">

  <div *ngFor="let song of songList.controls || [] ; let i = index;
       trackBy: trackSong"
       cdkDrag
       DragStyle
       class="song"
       [attr.data-index]="i">

    <track-line
      [tagDropZoneId]="'tagDropZone-' + i"
      [pldServ]="pldServ"
      [connectedDropLists] = songDropListConnections
      [songList]="song"
      [song]="song"/>
  </div>

  <add-slot-button (addEmptySlotTrigger)="addEmptySlotInSongList()"/>
</div>
