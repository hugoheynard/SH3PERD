name: CI/CD - Backend to ECS

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      - name: 🛠 Setup Node.js + pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.12.1

      - name: ⬇️ Install dependencies
        run: pnpm install

      - name: 🔍 Lint backend
        run: pnpm --filter @sh3pherd/backend lint

      - name: 🧪 Run unit and e2e tests
        run: |
          pnpm --filter @sh3pherd/backend test
          pnpm --filter @sh3pherd/backend test:e2e

      - name: 🐳 Build Docker image for backend
        run: docker build -f apps/backend/Dockerfile -t sh3pherd-backend .


