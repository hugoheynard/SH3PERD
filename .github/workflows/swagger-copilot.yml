name: GitHub Models Swagger Agent

on:
  push:
    branches:
      - main
      - develop

jobs:
  swagger-agent:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Swagger Agent (GitHub Models)
        run: node scripts/swagger-agent.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR with changes
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "feat: update swagger decorators"
          title: "Swagger auto-update"
          branch: "auto/swagger"
