name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Shared types (must build first — other apps depend on it) ──
  shared-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared-types
        run: pnpm --filter @sh3pherd/shared-types build

  # ── Backend: lint + typecheck + tests ──
  backend:
    needs: shared-types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @sh3pherd/shared-types build
      - run: pnpm --filter @sh3pherd/storage build

      - name: Lint
        run: pnpm --filter @sh3pherd/backend lint

      - name: Type check
        run: pnpm --filter @sh3pherd/backend exec tsc --noEmit

      - name: Unit tests
        run: pnpm --filter @sh3pherd/backend test

  # ── Audio processor: lint + typecheck + tests ──
  audio-processor:
    needs: shared-types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @sh3pherd/shared-types build
      - run: pnpm --filter @sh3pherd/storage build

      - name: Lint
        run: pnpm --filter audio-processor lint

      - name: Type check
        run: pnpm --filter audio-processor exec tsc --noEmit

      - name: Unit tests
        run: pnpm --filter audio-processor test

  # ── Frontend: typecheck + tests + build ──
  frontend:
    needs: shared-types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @sh3pherd/shared-types build

      - name: Type check
        run: pnpm --filter frontend-webapp exec tsc --noEmit

      - name: Unit tests
        # Note: do NOT use `pnpm test -- --ci --runInBand`. With pnpm 10
        # the explicit `--` is forwarded literally to the underlying
        # `jest` invocation, where `--` means "treat the rest as
        # positional file-pattern args". The result is jest matching
        # zero tests and exiting 1. Pass jest flags directly instead.
        run: pnpm --filter frontend-webapp test --ci --runInBand

      - name: Build
        run: pnpm --filter frontend-webapp build

  # ── Final gate: every job above must pass. Use this as the
  #    single "Required status check" in GitHub branch protection. ──
  ci-gate:
    name: CI gate
    needs: [shared-types, backend, audio-processor, frontend]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All CI jobs passed."
